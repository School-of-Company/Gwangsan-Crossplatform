name: iOS CD

on:
  workflow_dispatch:
  push:
    branches: ['main']

concurrency:
  group: version-bump
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Bump patch version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          CURRENT=$(node -p "require('./app.json').expo.version")
          NEW=$(echo $CURRENT | awk -F. '{print $1"."$2"."$3+1}')
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            app.expo.version = '$NEW';
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2) + '\n');
          "
          git add app.json
          git commit -m "chore: bump version to $NEW [skip ci]"
          for i in 1 2 3; do
            git push && break
            echo "Push failed, retrying ($i/3)..."
            git pull --rebase
          done

      - name: Install dependencies
        run: |
          npm ci

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Build (iOS)
        run: |
          eas build --platform ios --profile production --non-interactive --wait

      - name: EAS Submit (App Store)
        run: |
          eas submit --platform ios --profile production --latest --non-interactive
